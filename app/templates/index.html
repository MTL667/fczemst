<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Zemst Sportief - Broodjes Stage Oostende</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fcz: {
                            red: '#ec1f26',
                            yellow: '#f7ee23',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #111; min-height: 100vh; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-1 mb-4">
                <span class="bg-fcz-red text-white font-black text-xl px-3 py-1 rounded-l-lg">FC</span>
                <span class="bg-fcz-yellow text-black font-black text-xl px-3 py-1 rounded-r-lg">ZEMST</span>
            </div>
            <h1 class="text-2xl font-bold text-black">Broodjes Stage Oostende</h1>
            <p class="text-gray-500 mt-1 text-sm">Kies je broodjes voor zaterdag & zondag</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-black mb-2">Zoek je naam</label>
            <input
                type="text"
                id="searchInput"
                placeholder="Typ je naam..."
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-fcz-red focus:outline-none text-lg transition-colors"
                autocomplete="off"
            >
        </div>

        <div id="playerList" class="max-h-80 overflow-y-auto rounded-xl border border-gray-200 hidden">
        </div>

        <div id="selectedPlayer" class="hidden mt-6 p-4 bg-yellow-50 rounded-xl border-2 border-fcz-yellow">
            <p class="text-sm text-gray-500">Geselecteerd:</p>
            <p class="text-xl font-bold text-black" id="selectedName"></p>
            <p class="text-sm text-gray-500" id="selectedCategory"></p>
        </div>

        <button
            id="continueBtn"
            class="hidden w-full mt-6 py-4 bg-fcz-red hover:bg-red-700 text-white font-bold text-lg rounded-xl transition-colors"
            onclick="goToOrder()"
        >
            Broodjes kiezen →
        </button>

        <div class="mt-8 pt-4 border-t border-gray-100 text-center">
            <a href="/admin" class="text-xs text-gray-300 hover:text-gray-500 transition-colors">Admin</a>
        </div>
    </div>

    <script>
        let selectedPlayerId = null;
        const searchInput = document.getElementById('searchInput');
        const playerList = document.getElementById('playerList');
        const selectedPlayer = document.getElementById('selectedPlayer');
        const continueBtn = document.getElementById('continueBtn');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 1) {
                playerList.classList.add('hidden');
                return;
            }

            const res = await fetch(`/api/players?q=${encodeURIComponent(query)}`);
            const players = await res.json();
            renderPlayers(players);
        });

        searchInput.addEventListener('focus', async () => {
            if (searchInput.value.trim().length >= 1) {
                const res = await fetch(`/api/players?q=${encodeURIComponent(searchInput.value.trim())}`);
                const players = await res.json();
                renderPlayers(players);
            }
        });

        function renderPlayers(players) {
            if (players.length === 0) {
                playerList.innerHTML = '<p class="p-4 text-gray-400 text-center">Geen resultaten</p>';
                playerList.classList.remove('hidden');
                return;
            }

            let currentCategory = '';
            let html = '';

            for (const p of players) {
                if (p.category !== currentCategory) {
                    currentCategory = p.category;
                    html += `<div class="px-4 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase sticky top-0">${currentCategory}</div>`;
                }
                html += `
                    <div class="px-4 py-3 cursor-pointer hover:bg-yellow-50 border-l-4 border-transparent hover:border-fcz-yellow transition-all"
                         onclick="selectPlayer(${p.id}, '${p.name.replace(/'/g, "\\'")}', '${p.category}')">
                        <span class="font-medium text-black">${p.name}</span>
                    </div>
                `;
            }

            playerList.innerHTML = html;
            playerList.classList.remove('hidden');
        }

        function selectPlayer(id, name, category) {
            selectedPlayerId = id;
            document.getElementById('selectedName').textContent = name;
            document.getElementById('selectedCategory').textContent = category;
            selectedPlayer.classList.remove('hidden');
            continueBtn.classList.remove('hidden');
            playerList.classList.add('hidden');
            searchInput.value = name;
        }

        function goToOrder() {
            if (selectedPlayerId) {
                window.location.href = `/bestelling/${selectedPlayerId}`;
            }
        }
    </script>
</body>
</html>
