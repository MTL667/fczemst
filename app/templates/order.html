<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestelling - FC Zemst Sportief</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fcz: {
                            red: '#ec1f26',
                            yellow: '#f7ee23',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #111; min-height: 100vh; }
        .sandwich-btn { transition: all 0.15s; }
        .sandwich-btn:hover { border-color: #ccc; }
        .sandwich-btn.selected { background-color: #fffde6; border-color: #f7ee23; }
        .fruit-btn.selected { background-color: #fffde6; border-color: #f7ee23; }
        .day-tab.active { background-color: #ec1f26; color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 w-full max-w-2xl">
        <div class="flex items-center justify-between mb-6">
            <a href="/" class="text-gray-400 hover:text-black text-sm">← Terug</a>
            <div class="inline-flex items-center gap-0.5">
                <span class="bg-fcz-red text-white font-black text-xs px-2 py-0.5 rounded-l">FC</span>
                <span class="bg-fcz-yellow text-black font-black text-xs px-2 py-0.5 rounded-r">ZEMST</span>
            </div>
            <div class="w-12"></div>
        </div>

        <div id="playerInfo" class="text-center mb-6">
            <p class="text-2xl font-bold text-black" id="playerName">Laden...</p>
            <p class="text-sm text-gray-500" id="playerCategory"></p>
        </div>

        <!-- Day tabs -->
        <div class="flex gap-2 mb-6">
            <button class="day-tab active flex-1 py-3 rounded-xl font-bold text-center transition-all" onclick="switchDay('zaterdag')">
                Zaterdag
            </button>
            <button class="day-tab flex-1 py-3 rounded-xl font-bold text-center bg-gray-100 text-gray-600 transition-all" onclick="switchDay('zondag')">
                Zondag
            </button>
        </div>

        <!-- Order form -->
        <div id="orderForm">
            <div class="mb-6">
                <h3 class="font-bold text-black mb-1">Kies 3 broodjes</h3>
                <p class="text-xs text-gray-400 mb-3">Je mag meerdere keren hetzelfde kiezen</p>
                <div id="sandwichGrid" class="grid grid-cols-2 gap-2"></div>
                <p class="mt-2 text-sm font-medium" id="sandwichCount">Geselecteerd: 0/3</p>
            </div>

            <div class="mb-6">
                <h3 class="font-bold text-black mb-3">Kies 1 stuk fruit</h3>
                <div id="fruitGrid" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>

        <button
            id="saveBtn"
            class="w-full py-4 bg-fcz-red hover:bg-red-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed text-white font-bold text-lg rounded-xl transition-colors"
            onclick="saveOrder()"
            disabled
        >
            Opslaan
        </button>

        <div id="successMsg" class="hidden mt-4 p-4 bg-green-50 border border-green-200 rounded-xl text-center">
            <p class="text-green-700 font-bold">✓ Bestelling opgeslagen!</p>
        </div>

        <div id="errorMsg" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-center">
            <p class="text-red-700 font-bold" id="errorText"></p>
        </div>

        <!-- Status indicators -->
        <div class="mt-6 flex gap-4 justify-center">
            <div class="flex items-center gap-2">
                <div id="satStatus" class="w-3 h-3 rounded-full bg-gray-200"></div>
                <span class="text-xs text-gray-400">Zaterdag</span>
            </div>
            <div class="flex items-center gap-2">
                <div id="sunStatus" class="w-3 h-3 rounded-full bg-gray-200"></div>
                <span class="text-xs text-gray-400">Zondag</span>
            </div>
        </div>
    </div>

    <script>
        const playerId = {{ player_id }};
        let currentDay = 'zaterdag';
        let selections = {
            zaterdag: { sandwiches: [], fruit: null },
            zondag: { sandwiches: [], fruit: null }
        };
        let playerData = null;
        let options = null;

        const SANDWICH_EMOJI = {
            'pistolet kaas': '🧀',
            'pistolet hesp': '🥓',
            'pistolet kip': '🍗',
            'pistolet salami': '🌶️',
            'sandwich kaas': '🧀',
            'sandwich hesp': '🥓',
            'sandwich kip': '🍗',
            'sandwich salami': '🌶️',
        };

        async function init() {
            const [playerRes, optionsRes, ordersRes] = await Promise.all([
                fetch(`/api/players?q=`),
                fetch('/api/options'),
                fetch(`/api/players/${playerId}/orders`)
            ]);

            const players = await playerRes.json();
            options = await optionsRes.json();
            const existingOrders = await ordersRes.json();

            playerData = players.find(p => p.id === playerId);
            if (playerData) {
                document.getElementById('playerName').textContent = playerData.name;
                document.getElementById('playerCategory').textContent = playerData.category;
            }

            for (const order of existingOrders) {
                selections[order.day] = {
                    sandwiches: [order.sandwich_1, order.sandwich_2, order.sandwich_3],
                    fruit: order.fruit
                };
                if (order.day === 'zaterdag') document.getElementById('satStatus').classList.replace('bg-gray-200', 'bg-green-500');
                if (order.day === 'zondag') document.getElementById('sunStatus').classList.replace('bg-gray-200', 'bg-green-500');
            }

            renderForm();
        }

        function switchDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach((tab, i) => {
                if ((i === 0 && day === 'zaterdag') || (i === 1 && day === 'zondag')) {
                    tab.classList.add('active');
                    tab.classList.remove('bg-gray-100', 'text-gray-600');
                } else {
                    tab.classList.remove('active');
                    tab.classList.add('bg-gray-100', 'text-gray-600');
                }
            });
            renderForm();
        }

        function renderForm() {
            const sandwichGrid = document.getElementById('sandwichGrid');
            const fruitGrid = document.getElementById('fruitGrid');

            sandwichGrid.innerHTML = options.sandwiches.map(s => {
                const count = selections[currentDay].sandwiches.filter(x => x === s).length;
                const isSelected = count > 0;
                const label = s.replace('pistolet ', 'Pistolet ').replace('sandwich ', 'Sandwich ');
                return `
                    <button class="sandwich-btn p-3 border-2 rounded-xl text-left ${isSelected ? 'selected' : 'border-gray-200'}"
                            onclick="toggleSandwich('${s}')">
                        <span class="text-lg">${SANDWICH_EMOJI[s]}</span>
                        <span class="block font-medium text-sm mt-1 text-black">${label}</span>
                        ${count > 1 ? `<span class="text-xs text-fcz-red font-bold">×${count}</span>` : ''}
                    </button>
                `;
            }).join('');

            fruitGrid.innerHTML = options.fruit.map(f => {
                const isSelected = selections[currentDay].fruit === f;
                const emoji = f === 'appel' ? '🍎' : '🍌';
                return `
                    <button class="sandwich-btn fruit-btn p-3 border-2 rounded-xl text-left ${isSelected ? 'selected' : 'border-gray-200'}"
                            onclick="selectFruit('${f}')">
                        <span class="text-lg">${emoji}</span>
                        <span class="block font-medium text-sm mt-1 text-black capitalize">${f}</span>
                    </button>
                `;
            }).join('');

            updateCounter();
        }

        function toggleSandwich(sandwich) {
            const sel = selections[currentDay].sandwiches;
            if (sel.length < 3) {
                sel.push(sandwich);
            } else {
                const idx = sel.indexOf(sandwich);
                if (idx >= 0) {
                    sel.splice(idx, 1);
                } else {
                    sel.shift();
                    sel.push(sandwich);
                }
            }
            renderForm();
        }

        function selectFruit(fruit) {
            selections[currentDay].fruit = fruit;
            renderForm();
        }

        function updateCounter() {
            const count = selections[currentDay].sandwiches.length;
            const countEl = document.getElementById('sandwichCount');
            countEl.textContent = `Geselecteerd: ${count}/3`;
            countEl.className = `mt-2 text-sm font-medium ${count === 3 ? 'text-green-600' : 'text-fcz-red'}`;

            const canSave = selections[currentDay].sandwiches.length === 3 && selections[currentDay].fruit;
            document.getElementById('saveBtn').disabled = !canSave;
        }

        async function saveOrder() {
            const sel = selections[currentDay];
            const body = {
                player_id: playerId,
                day: currentDay,
                sandwich_1: sel.sandwiches[0],
                sandwich_2: sel.sandwiches[1],
                sandwich_3: sel.sandwiches[2],
                fruit: sel.fruit
            };

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    document.getElementById('successMsg').classList.remove('hidden');
                    document.getElementById('errorMsg').classList.add('hidden');
                    const statusEl = currentDay === 'zaterdag' ? 'satStatus' : 'sunStatus';
                    document.getElementById(statusEl).classList.replace('bg-gray-200', 'bg-green-500');
                    setTimeout(() => document.getElementById('successMsg').classList.add('hidden'), 3000);
                } else {
                    const data = await res.json();
                    document.getElementById('errorText').textContent = data.detail || 'Er ging iets mis';
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('errorText').textContent = 'Verbindingsfout';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        init();
    </script>
</body>
</html>
